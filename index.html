<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Erill</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Arial', sans-serif; overflow: hidden; color: white; }
        #textContainer { height: 30vh; display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .typing-text { font-size: 1.2rem; color: #ffb6c1; text-shadow: 0 0 10px #ff1493; font-weight: bold; }
        button { position: absolute; top: 50%; padding: 15px 35px; background: rgba(255, 20, 147, 0.2); color: #ffb6c1; border: 2px solid #ff69b4; border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px); font-weight: bold; z-index: 200; }
        #gardenArea { position: absolute; bottom: 0; width: 100%; height: 75vh; display: flex; align-items: flex-end; }
        .flower { position: absolute; bottom: -5px; transform-origin: bottom center; display: flex; flex-direction: column; align-items: center; }
        .flower__line { width: 1.5vmin; height: 40vmin; background: linear-gradient(to top, #142505, #4e9006); border-radius: 2vmin; }
        .flower__leaf { position: absolute; width: 6vmin; height: 3vmin; background: #4e9006; border-radius: 10vmin 10vmin 0 0; }
        .leaf-1 { top: 60%; left: -150%; transform: rotate(-30deg); }
        .leaf-2 { top: 40%; right: -150%; transform: rotate(30deg) scaleX(-1); }
        .flower__head { position: absolute; top: -4vmin; width: 12vmin; height: 12vmin; transform: scale(0); animation: bloom 1.5s forwards ease-out; }
        .flower__petal { position: absolute; left: 50%; bottom: 50%; transform-origin: bottom center; width: 5vmin; height: 8vmin; background: linear-gradient(to top, #ff1493, #ffb6c1); border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; }
        .flower__center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2.5vmin; height: 2.5vmin; background: #ffecb3; border-radius: 50%; box-shadow: 0 0 2vmin #ffd700; z-index: 10; }
        @keyframes bloom { to { transform: scale(1); } }
        @keyframes sway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="textContainer"><h1 id="displayText" class="typing-text"></h1></div>
    <button id="startBtn" onclick="startSurprise()">Buka Buat Erill ❤️</button>
    <div id="gardenArea" class="hidden"></div>
    <script>
        const messages = ["ini ada bunga buat erill", "cepet mandi sana!!", "biar wanginya sama kaya bunga ini", "hati hati di jalannya yaa ❤️"];
        let msgIdx = 0, charIdx = 0;
        function type() {
            if (msgIdx < messages.length) {
                let txt = messages[msgIdx];
                if (charIdx < txt.length) { document.getElementById("displayText").innerHTML += txt.charAt(charIdx); charIdx++; setTimeout(type, 70); }
                else { setTimeout(erase, 1500); }
            }
        }
        function erase() {
            if (document.getElementById("displayText").innerHTML.length > 0) { document.getElementById("displayText").innerHTML = document.getElementById("displayText").innerHTML.slice(0, -1); setTimeout(erase, 30); }
            else { msgIdx++; charIdx = 0; if (msgIdx < messages.length) setTimeout(type, 300); else document.getElementById("displayText").innerHTML = messages[messages.length-1]; }
        }
        function startSurprise() {
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('gardenArea').classList.remove('hidden');
            for(let i=0; i<20; i++) {
                const f = document.createElement('div'); f.className = 'flower'; f.style.left = Math.random()*95+'%'; f.style.transform = `scale(${0.4+Math.random()*0.7})`;
                f.style.animation = `sway ${3+Math.random()*2}s infinite ease-in-out`;
                let petals = ''; for(let j=0; j<8; j++) petals += `<div class="flower__petal" style="transform: rotate(${j*45}deg); animation-delay: ${Math.random()}s"></div>`;
                f.innerHTML = `<div class="flower__head">${petals}<div class="flower__center"></div></div><div class="flower__line"><div class="flower__leaf leaf-1"></div><div class="flower__leaf leaf-2"></div></div>`;
                document.getElementById('gardenArea').appendChild(f);
            }
            setTimeout(type, 500);
        }
    </script>
</body>
</html>
